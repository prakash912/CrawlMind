# CrawlMind frontend – Netlify build and headers

[build]
  command = "npm run build"
  publish = "dist"

# SPA: serve index.html for client-side routes (Netlify serves static files first)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

# Fix MIME type for JS/CSS so browsers accept module scripts (avoids "application/octet-stream" error)
[[headers]]
  for = "/*.js"
  [headers.values]
  Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.mjs"
  [headers.values]
  Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.css"
  [headers.values]
  Content-Type = "text/css; charset=utf-8"
